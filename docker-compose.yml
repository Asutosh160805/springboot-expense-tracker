version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: expense-postgres

    restart: always

    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dash@160805

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:

    image: expense-tracker

    container_name: expense-app

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expense_tracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Dash@160805

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true

      JWT_SECRET: mySuperSecretKeyForExpenseTrackerProject123456

volumes:
  postgres-data: